<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pulso Go! - Control de Acceso</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0e1a 0%, #0f1422 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .main-container { width: 100%; max-width: 500px; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #3498db, #2ecc71);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { font-size: 13px; color: #6c7293; margin-top: 5px; }
        .video-container {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(52, 152, 219, 0.3);
        }
        video { width: 100%; display: block; aspect-ratio: 4/3; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(52, 152, 219, 0.15);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 40px;
            margin-top: 15px;
            font-size: 13px;
            font-weight: 500;
            color: #3498db;
            border: 1px solid rgba(52, 152, 219, 0.3);
        }
        .welcome-card {
            display: none;
            margin-top: 20px;
            background: linear-gradient(135deg, #1a1f2e 0%, #0f1422 100%);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(46, 204, 113, 0.3);
            animation: slideUp 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .card-header {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .card-header .access-badge {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }
        .card-body { padding: 24px; }
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .user-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        .user-details { flex: 1; }
        .user-name { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .user-company { font-size: 13px; color: #2ecc71; display: flex; align-items: center; gap: 6px; }
        .info-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
        }
        .info-label { font-size: 12px; color: #8b8faa; display: flex; align-items: center; gap: 8px; }
        .info-label i { width: 18px; font-size: 12px; color: #2ecc71; }
        .info-value { font-size: 13px; font-weight: 600; color: #fff; }
        .access-status {
            margin-top: 16px;
            padding: 12px;
            background: rgba(46, 204, 113, 0.1);
            border-radius: 12px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .access-status i { font-size: 20px; color: #2ecc71; }
        .access-status span { font-size: 14px; font-weight: 600; color: #2ecc71; }
        .denied-card {
            display: none;
            margin-top: 20px;
            background: linear-gradient(135deg, #2a1a1a 0%, #1a0f0f 100%);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(231, 76, 60, 0.3);
            animation: shake 0.5s ease-in-out;
        }
        .denied-header {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            padding: 16px 20px;
            text-align: center;
        }
        .denied-body { padding: 32px 24px; text-align: center; }
        .denied-body h3 { font-size: 24px; color: #e74c3c; margin-bottom: 8px; }
        .denied-body p { color: #a0a0a0; font-size: 14px; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header">
            <h1>Pulso Go!</h1>
            <p>Control de Acceso Facial</p>
        </div>

        <div class="video-container">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
        </div>

        <div style="text-align: center;">
            <div class="status-badge" id="status">
                <i class="fas fa-circle-notch fa-spin"></i>
                <span>Inicializando sistema...</span>
            </div>
        </div>

        <div class="welcome-card" id="welcome-card">
            <div class="card-header">
                <span class="access-badge"><i class="fas fa-check-circle"></i> ACCESO AUTORIZADO</span>
                <i class="fas fa-id-card"></i>
            </div>
            <div class="card-body">
                <div class="user-info">
                    <div class="user-avatar"><i class="fas fa-user-check"></i></div>
                    <div class="user-details">
                        <div class="user-name" id="welcome-name">Cargando...</div>
                        <div class="user-company" id="welcome-company"><i class="fas fa-building"></i><span>Cargando...</span></div>
                    </div>
                </div>
                <div class="info-row">
                    <div class="info-label"><i class="fas fa-id-card"></i><span>RUT / DNI</span></div>
                    <div class="info-value" id="user-rut">---</div>
                </div>
                <div class="info-row">
                    <div class="info-label"><i class="fas fa-briefcase"></i><span>Cargo</span></div>
                    <div class="info-value" id="user-role">---</div>
                </div>
                <div class="access-status"><i class="fas fa-check-circle"></i><span>ACCESO CONCEDIDO</span></div>
            </div>
        </div>

        <div class="denied-card" id="denied-card">
            <div class="denied-header"><i class="fas fa-ban"></i></div>
            <div class="denied-body">
                <i class="fas fa-user-slash" style="font-size: 48px; color: #e74c3c; margin-bottom: 16px; display: block;"></i>
                <h3>ACCESO DENEGADO</h3>
                <p>Usuario no registrado en el sistema</p>
            </div>
        </div>
    </div>

    <script>
        // ===== CONFIGURACIÓN =====
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwRDhofBv-AyXF9AgzekgPeII37Fw-6JmKSfYR6U-3-5eInkL-sdXS7wthzBbbASUFYeA/exec";
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('overlay');
        const statusDiv = document.getElementById('status');
        const welcomeCard = document.getElementById('welcome-card');
        const deniedCard = document.getElementById('denied-card');
        const welcomeName = document.getElementById('welcome-name');
        const welcomeCompany = document.getElementById('welcome-company');
        const userRut = document.getElementById('user-rut');
        const userRole = document.getElementById('user-role');
        
        let usuariosRegistrados = [];
        let deteccionEnProceso = false;
        let timeoutReactivacion = null;
        let timeoutOcultarCard = null;
        
        // ===== FUNCIONES PRINCIPALES =====
        async function iniciarSistema() {
            try {
                updateStatus("Cargando modelos faciales...", "fa-spinner fa-pulse");
                
                await faceapi.nets.tinyFaceDetector.loadFromUri('/models');
                await faceapi.nets.faceLandmark68Net.loadFromUri('/models');
                await faceapi.nets.faceRecognitionNet.loadFromUri('/models');
                
                updateStatus("Cargando base de datos...", "fa-spinner fa-pulse");
                await cargarUsuarios();
                
                const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
                video.srcObject = stream;
                
                video.onplay = () => {
                    updateStatus("Sistema activo - Mostrando rostro", "fa-eye");
                    const displaySize = { width: video.clientWidth, height: video.clientHeight };
                    faceapi.matchDimensions(canvas, displaySize);
                    
                    setInterval(async () => {
                        if (deteccionEnProceso) return;
                        
                        deteccionEnProceso = true;
                        
                        const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                            .withFaceLandmarks()
                            .withFaceDescriptors();
                        
                        const resized = faceapi.resizeResults(detections, displaySize);
                        const ctx = canvas.getContext('2d');
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        
                        if (resized.length > 0) {
                            const rostro = resized[0];
                            const descriptor = rostro.descriptor;
                            const resultado = buscarCoincidencia(descriptor);
                            
                            if (resultado.label !== "Desconocido") {
                                // ACCESO CONCEDIDO
                                dibujarCuadro(ctx, rostro, true);
                                mostrarTarjetaBienvenida(resultado.datos);
                                await registrarAcceso(resultado.datos);
                            } else {
                                // ACCESO DENEGADO
                                dibujarCuadro(ctx, rostro, false);
                                mostrarTarjetaDenegada();
                            }
                            
                            // Bloquear detecciones por 3 segundos
                            setTimeout(() => {
                                deteccionEnProceso = false;
                            }, 3000);
                        } else {
                            deteccionEnProceso = false;
                            ocultarTarjetas();
                        }
                    }, 100);
                };
            } catch (err) {
                updateStatus("Error: " + err.message, "fa-exclamation-triangle");
                console.error("Error:", err);
            }
        }
        
        function dibujarCuadro(ctx, rostro, esAutorizado) {
            const color = esAutorizado ? "#2ecc71" : "#e74c3c";
            const texto = esAutorizado ? "✓ AUTORIZADO" : "✗ ACCESO DENEGADO";
            
            ctx.strokeStyle = color;
            ctx.lineWidth = 4;
            ctx.strokeRect(rostro.detection.box.x, rostro.detection.box.y, 
                         rostro.detection.box.width, rostro.detection.box.height);
            ctx.font = "bold 16px 'Inter', sans-serif";
            ctx.fillStyle = color;
            ctx.fillText(texto, rostro.detection.box.x, rostro.detection.box.y - 8);
        }
        
        function mostrarTarjetaBienvenida(usuario) {
            if (timeoutOcultarCard) clearTimeout(timeoutOcultarCard);
            
            deniedCard.style.display = 'none';
            welcomeName.textContent = usuario.name;
            welcomeCompany.querySelector('span').textContent = usuario.empresa;
            userRut.textContent = usuario.rut;
            userRole.textContent = usuario.role;
            welcomeCard.style.display = 'block';
            
            timeoutOcultarCard = setTimeout(() => ocultarTarjetas(), 4000);
        }
        
        function mostrarTarjetaDenegada() {
            if (timeoutOcultarCard) clearTimeout(timeoutOcultarCard);
            welcomeCard.style.display = 'none';
            deniedCard.style.display = 'block';
            timeoutOcultarCard = setTimeout(() => ocultarTarjetas(), 3000);
        }
        
        function ocultarTarjetas() {
            welcomeCard.style.display = 'none';
            deniedCard.style.display = 'none';
        }
        
        async function cargarUsuarios() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                usuariosRegistrados = data.map(user => ({
                    id: user.id,
                    name: user.name,
                    rut: user.rut,
                    role: user.role,
                    empresa: user.empresa,
                    descriptor: new Float32Array(JSON.parse(user.faceDescriptor))
                }));
                
                console.log(`✅ ${usuariosRegistrados.length} usuarios cargados`);
            } catch (e) {
                console.error("Error cargando usuarios:", e);
                usuariosRegistrados = [];
            }
        }
        
        function buscarCoincidencia(descriptorActual) {
            if (usuariosRegistrados.length === 0) {
                return { label: "Desconocido", datos: null };
            }
            
            const labeledDescriptors = usuariosRegistrados.map(u => 
                new faceapi.LabeledFaceDescriptors(u.name, [u.descriptor])
            );
            
            const faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.55);
            const bestMatch = faceMatcher.findBestMatch(descriptorActual);
            
            if (bestMatch.label !== "unknown") {
                const usuario = usuariosRegistrados.find(u => u.name === bestMatch.label);
                return { label: bestMatch.label, datos: usuario };
            }
            
            return { label: "Desconocido", datos: null };
        }
        
        async function registrarAcceso(usuario) {
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        action: 'registrarAcceso',
                        userId: usuario.id,
                        userName: usuario.name,
                        timestamp: new Date().toISOString()
                    })
                });
                console.log("✅ Acceso registrado:", usuario.name);
            } catch (err) {
                console.error("Error registrando acceso:", err);
            }
        }
        
        function updateStatus(texto, icono) {
            const statusEl = document.getElementById('status');
            if (statusEl) {
                statusEl.innerHTML = `<i class="fas ${icono}"></i><span>${texto}</span>`;
            }
        }
        
        // Iniciar
        iniciarSistema();
    </script>
</body>
</html>
