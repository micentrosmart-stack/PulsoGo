<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulso Go! - Control de Acceso (Entrada/Salida)</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script defer src="script.js"></script>
    <style>
        body { margin: 0; background: #121621; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        .main-container { width: 90%; max-width: 500px; display: flex; flex-direction: column; align-items: center; }

        .video-box { position: relative; width: 100%; border-radius: 15px; overflow: hidden; border: 3px solid #3498db; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        video { width: 100%; display: block; background: #000; }
        canvas { position: absolute; top: 0; left: 0; }

        #status { margin-top: 15px; font-size: 16px; color: #3498db; font-weight: bold; }

        /* Panel de bienvenida mejorado */
        #welcome-panel { display: none; margin-top: 20px; padding: 20px; background: rgba(46, 204, 113, 0.2); border: 2px solid #2ecc71; border-radius: 10px; width: 90%; animation: fadeIn 0.5s; }
        #welcome-message { font-size: 22px; color: #2ecc71; font-weight: bold; margin: 0; }
        #action-text { font-size: 18px; margin: 5px 0 0 0; }
        #timestamp-text { font-size: 14px; color: #aaa; margin: 8px 0 0 0; }

        /* Panel de acceso denegado */
        #denied-panel { display: none; margin-top: 20px; padding: 20px; background: rgba(231, 76, 60, 0.2); border: 2px solid #e74c3c; border-radius: 10px; width: 90%; animation: fadeIn 0.5s; }
        #denied-message { font-size: 22px; color: #e74c3c; font-weight: bold; margin: 0; }

        /* Historial de accesos */
        .history-box { margin-top: 20px; padding: 15px; background: #1a1f2c; border-radius: 10px; width: 90%; max-height: 200px; overflow-y: auto; }
        .history-box h3 { margin: 0 0 10px 0; color: #3498db; font-size: 16px; }
        .history-item { padding: 5px; margin: 3px 0; border-radius: 5px; font-size: 12px; text-align: left; }
        .history-in { background: rgba(46, 204, 113, 0.2); border-left: 3px solid #2ecc71; padding-left: 8px; }
        .history-out { background: rgba(231, 76, 60, 0.2); border-left: 3px solid #e74c3c; padding-left: 8px; }
        .history-denied { background: rgba(149, 165, 166, 0.2); border-left: 3px solid #95a5a6; padding-left: 8px; }

        /* Sección de registro */
        .register-box { margin-top: 20px; padding: 15px; background: #1a1f2c; border-radius: 10px; width: 90%; }
        input, select { width: 85%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #3498db; background: #121621; color: white; }
        button { width: 85%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background: #2980b9; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Scroll personalizado */
        .history-box::-webkit-scrollbar { width: 6px; }
        .history-box::-webkit-scrollbar-track { background: #0f1117; border-radius: 3px; }
        .history-box::-webkit-scrollbar-thumb { background: #3498db; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="main-container">
        <h1 style="color: #3498db; margin-bottom: 20px;">Pulso Go! - Control de Acceso</h1>

        <div class="video-box">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
        </div>

        <div id="status">Cargando sistema...</div>

        <!-- Panel de Acceso Permitido -->
        <div id="welcome-panel">
            <p id="welcome-message">Bienvenido,</p>
            <p id="action-text">Acceso permitido</p>
            <p id="timestamp-text"></p>
        </div>

        <!-- Panel de Acceso Denegado -->
        <div id="denied-panel">
            <p id="denied-message">⛔ ACCESO DENEGADO ⛔</p>
            <p id="denied-reason">Rostro no registrado en el sistema</p>
        </div>

        <!-- Historial de accesos -->
        <div class="history-box">
            <h3>📋 HISTORIAL DE ACCESOS (Hoy)</h3>
            <div id="history-list">
                <div style="text-align: center; color: #666;">Esperando actividad...</div>
            </div>
        </div>

        <div class="register-box">
            <h3 style="margin-top: 0;">📝 Registrar Nuevo Usuario</h3>
            <input type="text" id="personName" placeholder="Nombre Completo">
            <input type="text" id="personRole" placeholder="Cargo / Departamento">
            <button onclick="enviarANube()">📸 GUARDAR ROSTRO</button>
        </div>
    </div>

</body>
</html>
