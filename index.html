<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pulso Go! - Control de Acceso Profesional</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0e1a 0%, #0f1422 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-container {
            width: 100%;
            max-width: 500px;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #3498db, #2ecc71);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 13px;
            color: #6c7293;
            margin-top: 5px;
        }

        .video-container {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(52, 152, 219, 0.3);
        }

        video {
            width: 100%;
            display: block;
            aspect-ratio: 4/3;
            object-fit: cover;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(52, 152, 219, 0.15);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 40px;
            margin-top: 15px;
            font-size: 13px;
            font-weight: 500;
            color: #3498db;
            border: 1px solid rgba(52, 152, 219, 0.3);
        }

        /* Tarjeta de Bienvenida */
        .welcome-card {
            display: none;
            margin-top: 20px;
            background: linear-gradient(135deg, #1a1f2e 0%, #0f1422 100%);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(46, 204, 113, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .card-header {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-header .access-badge {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }

        .card-body {
            padding: 24px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }

        .user-company {
            font-size: 13px;
            color: #2ecc71;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
        }

        .info-label {
            font-size: 12px;
            color: #8b8faa;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-label i {
            width: 18px;
            font-size: 12px;
            color: #2ecc71;
        }

        .info-value {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
        }

        .access-status {
            margin-top: 16px;
            padding: 12px;
            background: rgba(46, 204, 113, 0.1);
            border-radius: 12px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .access-status i {
            font-size: 20px;
            color: #2ecc71;
        }

        .access-status span {
            font-size: 14px;
            font-weight: 600;
            color: #2ecc71;
        }

        /* Tarjeta Denegada */
        .denied-card {
            display: none;
            margin-top: 20px;
            background: linear-gradient(135deg, #2a1a1a 0%, #1a0f0f 100%);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(231, 76, 60, 0.3);
            animation: shake 0.5s ease-in-out;
        }

        .denied-header {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .denied-body {
            padding: 32px 24px;
            text-align: center;
        }

        .denied-body h3 {
            font-size: 24px;
            color: #e74c3c;
            margin-bottom: 8px;
        }

        .denied-body p {
            color: #a0a0a0;
            font-size: 14px;
        }

        /* Botón cerrar tarjeta */
        .close-card-btn {
            cursor: pointer;
            font-size: 20px;
            opacity: 0.8;
            transition: opacity 0.2s;
        }
        .close-card-btn:hover {
            opacity: 1;
        }

        /* Formulario de Registro */
        .register-card {
            margin-top: 24px;
            background: rgba(26, 31, 46, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .register-card h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #b0b0b0;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15, 20, 34, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3498db;
            background: rgba(15, 20, 34, 1);
        }

        .form-group input::placeholder {
            color: #4a4f6e;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.3);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header">
            <h1>Pulso Go!</h1>
            <p>Sistema de Control de Acceso</p>
        </div>

        <div class="video-container">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
        </div>

        <div style="text-align: center;">
            <div class="status-badge" id="status">
                <i class="fas fa-circle-notch fa-spin"></i>
                <span>Inicializando sistema...</span>
            </div>
        </div>

        <!-- Tarjeta de Bienvenida (Autorizado) -->
        <div class="welcome-card" id="welcome-card">
            <div class="card-header">
                <span class="access-badge"><i class="fas fa-check-circle"></i> ACCESO AUTORIZADO</span>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <i class="fas fa-id-card"></i>
                    <i class="fas fa-times-circle close-card-btn" onclick="cerrarTarjetas()"></i>
                </div>
            </div>
            <div class="card-body">
                <div class="user-info">
                    <div class="user-avatar">
                        <i class="fas fa-user-check"></i>
                    </div>
                    <div class="user-details">
                        <div class="user-name" id="welcome-name">Cargando...</div>
                        <div class="user-company" id="welcome-company">
                            <i class="fas fa-building"></i>
                            <span>Cargando...</span>
                        </div>
                    </div>
                </div>
                <div class="info-row">
                    <div class="info-label"><i class="fas fa-id-card"></i><span>RUT / DNI</span></div>
                    <div class="info-value" id="user-rut">---</div>
                </div>
                <div class="info-row">
                    <div class="info-label"><i class="fas fa-briefcase"></i><span>Cargo</span></div>
                    <div class="info-value" id="user-role">---</div>
                </div>
                <div class="info-row">
                    <div class="info-label"><i class="fas fa-map-pin"></i><span>Instalación</span></div>
                    <div class="info-value" id="user-instalacion">---</div>
                </div>
                <div class="access-status">
                    <i class="fas fa-check-circle"></i>
                    <span>ACCESO CONCEDIDO</span>
                </div>
            </div>
        </div>

        <!-- Tarjeta de Acceso Denegado -->
        <div class="denied-card" id="denied-card">
            <div class="denied-header">
                <i class="fas fa-ban"></i>
                <i class="fas fa-times-circle close-card-btn" onclick="cerrarTarjetas()"></i>
            </div>
            <div class="denied-body">
                <i class="fas fa-user-slash" style="font-size: 48px; color: #e74c3c; margin-bottom: 16px; display: block;"></i>
                <h3>ACCESO DENEGADO</h3>
                <p>Usuario no registrado en el sistema</p>
            </div>
        </div>

        <!-- Formulario de Registro -->
        <div class="register-card">
            <h3><i class="fas fa-user-plus"></i> Registrar Nuevo Usuario</h3>
            <div class="form-group">
                <input type="text" id="personRut" placeholder="RUT / DNI (Ej: 12.345.678-9)">
            </div>
            <div class="form-group">
                <input type="text" id="personName" placeholder="Nombre Completo">
            </div>
            <div class="form-group">
                <input type="text" id="personRole" placeholder="Cargo / Puesto">
            </div>
            <div class="form-group">
                <input type="text" id="personEmpresa" placeholder="Empresa">
            </div>
            <div class="form-group">
                <input type="text" id="personInstalacion" placeholder="Instalación / Sucursal">
            </div>
            <button class="btn-register" onclick="enviarANube()">
                <i class="fas fa-save"></i> Guardar Registro
            </button>
        </div>
    </div>

    <script>
        // ===== CONFIGURACIÓN =====
        const SCRIPT_URL_USUARIOS = "https://script.google.com/macros/s/AKfycbwRDhofBv-AyXF9AgzekgPeII37Fw-6JmKSfYR6U-3-5eInkL-sdXS7wthzBbbASUFYeA/exec";
        const SCRIPT_URL_REGISTRO = "https://script.google.com/macros/s/AKfycbw6WM72PGsbbRacwHNv7VLiOe4r8DcXZ0Vjrvbcgh9etbzbtvCXCMdaYTI9eX4KS62LdQ/exec";

        const video = document.getElementById('video');
        const canvas = document.getElementById('overlay');
        const statusDiv = document.getElementById('status');
        const welcomeCard = document.getElementById('welcome-card');
        const deniedCard = document.getElementById('denied-card');
        const welcomeName = document.getElementById('welcome-name');
        const welcomeCompany = document.getElementById('welcome-company');
        const userRut = document.getElementById('user-rut');
        const userRole = document.getElementById('user-role');
        const userInstalacion = document.getElementById('user-instalacion');

        let usuariosRegistrados = [];
        let cargandoUsuarios = true;
        let deteccionEnProceso = false;
        let ultimoUsuarioMostrado = null;
        let ultimoRegistroAcceso = {};
        let modoRegistro = false;

        // ===== FUNCIONES GLOBALES =====
        window.cerrarTarjetas = function() {
            welcomeCard.style.display = 'none';
            deniedCard.style.display = 'none';
            ultimoUsuarioMostrado = null;
            console.log("🚫 Tarjetas cerradas manualmente");
        };

        window.enviarANube = async function() {
            activarModoRegistro();
            
            const rut = document.getElementById('personRut').value;
            const name = document.getElementById('personName').value;
            const role = document.getElementById('personRole').value;
            const empresa = document.getElementById('personEmpresa').value;
            const instalacion = document.getElementById('personInstalacion')?.value || 'No especificada';
            
            if (!rut || !name || !role || !empresa) {
                alert("❌ Por favor, completa TODOS los campos:\n- RUT\n- Nombre Completo\n- Cargo\n- Empresa");
                desactivarModoRegistro();
                return;
            }

            updateStatus("Capturando rostro...", "fa-camera");
            
            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                .withFaceLandmarks()
                .withFaceDescriptor();

            if (detection) {
                const payload = {
                    id: Date.now().toString(),
                    rut: rut,
                    name: name.toUpperCase(),
                    role: role,
                    empresa: empresa.toUpperCase(),
                    instalacion: instalacion,
                    faceDescriptor: JSON.stringify(Array.from(detection.descriptor))
                };
                
                fetch(SCRIPT_URL_USUARIOS, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify(payload) 
                })
                .then(() => {
                    alert(`✅ REGISTRO EXITOSO!\n\n👤 ${name}\n🏭 ${instalacion}\n🔄 Recargando...`);
                    location.reload();
                })
                .catch(err => {
                    console.error("❌ Error:", err);
                    alert("❌ Error al registrar: " + err.message);
                    desactivarModoRegistro();
                });
            } else {
                alert("❌ No se detectó ningún rostro.");
                updateStatus("No se detectó rostro", "fa-face-frown");
                desactivarModoRegistro();
            }
        };

        // ===== FUNCIONES INTERNAS =====
        async function registrarAccesoEnArchivoSeparado(usuario) {
            try {
                const ahora = Date.now();
                if (ultimoRegistroAcceso[usuario.id] && ahora - ultimoRegistroAcceso[usuario.id] < 10000) {
                    return;
                }
                ultimoRegistroAcceso[usuario.id] = ahora;
                
                const payload = {
                    id: usuario.id,
                    rut: usuario.rut,
                    name: usuario.name,
                    role: usuario.role,
                    empresa: usuario.empresa,
                    instalacion: usuario.instalacion,
                    fecha: new Date().toISOString()
                };
                
                await fetch(SCRIPT_URL_REGISTRO, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify(payload) 
                });
                console.log("✅ Acceso registrado:", usuario.name);
            } catch (err) {
                console.error("❌ Error:", err);
            }
        }

        async function iniciarSistema() {
            try {
                updateStatus("Cargando modelos faciales...", "fa-spinner fa-pulse");
                
                const path = '.';
                await faceapi.nets.tinyFaceDetector.loadFromUri(path);
                await faceapi.nets.faceLandmark68Net.loadFromUri(path);
                await faceapi.nets.faceRecognitionNet.loadFromUri(path);
                
                updateStatus("Cargando base de datos...", "fa-spinner fa-pulse");
                await cargarUsuariosDesdeExcel();
                cargandoUsuarios = false;
                
                console.log("✅ Sistema listo -", usuariosRegistrados.length, "usuarios");

                const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
                video.srcObject = stream;
                
                video.onplay = () => {
                    updateStatus("Sistema activo - Esperando usuario", "fa-eye");
                    const displaySize = { width: video.clientWidth, height: video.clientHeight };
                    faceapi.matchDimensions(canvas, displaySize);

                    setInterval(async () => {
                        if (modoRegistro || deteccionEnProceso) return;
                        
                        deteccionEnProceso = true;
                        
                        const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                            .withFaceLandmarks()
                            .withFaceDescriptors();
                        
                        const resized = faceapi.resizeResults(detections, displaySize);
                        const ctx = canvas.getContext('2d');
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        
                        let personaAutorizada = false;
                        let datosPersona = null;
                        let rostroEncontrado = false;
                        
                        if (resized.length > 0) {
                            rostroEncontrado = true;
                            const rostro = resized[0];
                            const resultado = buscarCoincidencia(rostro.descriptor);
                            
                            if (resultado.label !== "Desconocido" && resultado.label !== "unknown") {
                                personaAutorizada = true;
                                datosPersona = resultado.datos;
                            }
                            
                            dibujarCuadroDeteccion(ctx, rostro, personaAutorizada);
                        }
                        
                        if (personaAutorizada && datosPersona) {
                            if (!ultimoUsuarioMostrado || ultimoUsuarioMostrado.id !== datosPersona.id) {
                                mostrarTarjetaBienvenida(datosPersona);
                                ultimoUsuarioMostrado = datosPersona;
                            }
                        } else if (rostroEncontrado && !personaAutorizada) {
                            if (!ultimoUsuarioMostrado || ultimoUsuarioMostrado.id !== 'denegado') {
                                mostrarTarjetaDenegada();
                                ultimoUsuarioMostrado = { id: 'denegado' };
                            }
                        }
                        
                        setTimeout(() => { deteccionEnProceso = false; }, 3000);
                        updateStatus("Sistema activo", "fa-eye");
                        
                    }, 100);
                };
            } catch (err) {
                updateStatus("Error: " + err.message, "fa-exclamation-triangle");
                console.error(err);
            }
        }

        function dibujarCuadroDeteccion(ctx, rostro, esAutorizado) {
            if (esAutorizado) {
                ctx.strokeStyle = "#2ecc71";
                ctx.lineWidth = 4;
                ctx.shadowColor = "#2ecc71";
                ctx.shadowBlur = 10;
                ctx.strokeRect(rostro.detection.box.x, rostro.detection.box.y, 
                             rostro.detection.box.width, rostro.detection.box.height);
                ctx.shadowBlur = 0;
                ctx.fillStyle = "#2ecc71";
                ctx.font = "bold 16px 'Inter'";
                ctx.fillText("✓ AUTORIZADO", rostro.detection.box.x, rostro.detection.box.y - 8);
            } else {
                ctx.strokeStyle = "#e74c3c";
                ctx.lineWidth = 4;
                ctx.shadowColor = "#e74c3c";
                ctx.shadowBlur = 10;
                ctx.strokeRect(rostro.detection.box.x, rostro.detection.box.y, 
                             rostro.detection.box.width, rostro.detection.box.height);
                ctx.shadowBlur = 0;
                ctx.fillStyle = "#e74c3c";
                ctx.font = "bold 16px 'Inter'";
                ctx.fillText("✗ ACCESO DENEGADO", rostro.detection.box.x, rostro.detection.box.y - 8);
            }
        }

        function mostrarTarjetaBienvenida(usuario) {
            registrarAccesoEnArchivoSeparado(usuario);
            
            deniedCard.style.display = 'none';
            welcomeName.textContent = usuario.name || "Usuario";
            
            const companySpan = welcomeCompany.querySelector('span');
            if (companySpan) companySpan.textContent = usuario.empresa || "No especificada";
            
            userRut.textContent = usuario.rut || "No registrado";
            userRole.textContent = usuario.role || "No especificado";
            if (userInstalacion) userInstalacion.textContent = usuario.instalacion || "No especificada";
            
            welcomeCard.style.display = 'block';
            console.log("🎉 BIENVENIDO:", usuario.name);
        }

        function mostrarTarjetaDenegada() {
            welcomeCard.style.display = 'none';
            deniedCard.style.display = 'block';
        }

        function updateStatus(texto, icono) {
            const statusEl = document.getElementById('status');
            if (statusEl) {
                statusEl.innerHTML = `<i class="fas ${icono}"></i><span>${texto}</span>`;
            }
        }

        async function cargarUsuariosDesdeExcel() {
            try {
                const response = await fetch(SCRIPT_URL_USUARIOS);
                const data = await response.json();
                usuariosRegistrados = data.map(user => ({
                    id: user.id,
                    name: user.name,
                    rut: user.rut,
                    role: user.role,
                    empresa: user.empresa,
                    instalacion: user.instalacion,
                    descriptor: new Float32Array(JSON.parse(user.faceDescriptor))
                }));
                console.log("📥 Datos recibidos:", usuariosRegistrados.length, "usuarios");
            } catch (e) {
                console.error("❌ Error:", e);
                usuariosRegistrados = [];
            }
        }

        function buscarCoincidencia(descriptorActual) {
            if (usuariosRegistrados.length === 0) return { label: "Desconocido", datos: null };

            const labeledDescriptors = usuariosRegistrados.map(u => 
                new faceapi.LabeledFaceDescriptors(u.name, [u.descriptor])
            );
            
            const faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.55);
            const bestMatch = faceMatcher.findBestMatch(descriptorActual);
            
            if (bestMatch.label !== "unknown" && bestMatch.label !== "Desconocido") {
                const usuarioEncontrado = usuariosRegistrados.find(u => u.name === bestMatch.label);
                return { label: bestMatch.label, datos: usuarioEncontrado };
            }
            return { label: "Desconocido", datos: null };
        }

        function activarModoRegistro() {
            modoRegistro = true;
            window.cerrarTarjetas();
            updateStatus("📝 MODO REGISTRO ACTIVO", "fa-user-plus");
        }

        function desactivarModoRegistro() {
            modoRegistro = false;
            updateStatus("Sistema activo", "fa-eye");
        }

        // Iniciar todo
        iniciarSistema();
    </script>
</body>
</html>
