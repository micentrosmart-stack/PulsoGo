<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pulso Go! - Control de Acceso</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script defer src="script.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0e1a 0%, #0f1422 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .main-container { width: 100%; max-width: 500px; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #3498db, #2ecc71);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { font-size: 13px; color: #6c7293; margin-top: 5px; }
        .video-container {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(52, 152, 219, 0.3);
        }
        video { width: 100%; display: block; aspect-ratio: 4/3; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(52, 152, 219, 0.15);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 40px;
            margin-top: 15px;
            font-size: 13px;
            font-weight: 500;
            color: #3498db;
            border: 1px solid rgba(52, 152, 219, 0.3);
        }
        .welcome-card {
            display: none;
            margin-top: 20px;
            background: linear-gradient(135deg, #1a1f2e 0%, #0f1422 100%);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(46, 204, 113, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .card-header {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .card-header .access-badge {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }
        .card-body { padding: 24px; }
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .user-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        .user-details { flex: 1; }
        .user-name { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .user-company { font-size: 13px; color: #2ecc71; display: flex; align-items: center; gap: 6px; }
        .info-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
        }
        .info-label { font-size: 12px; color: #8b8faa; display: flex; align-items: center; gap: 8px; }
        .info-label i { width: 18px; font-size: 12px; color: #2ecc71; }
        .info-value { font-size: 13px; font-weight: 600; color: #fff; }
        .access-status {
            margin-top: 16px;
            padding: 12px;
            background: rgba(46, 204, 113, 0.1);
            border-radius: 12px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .access-status i { font-size: 20px; color: #2ecc71; }
        .access-status span { font-size: 14px; font-weight: 600; color: #2ecc71; }
        .denied-card {
            display: none;
            margin-top: 20px;
            background: linear-gradient(135deg, #2a1a1a 0%, #1a0f0f 100%);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(231, 76, 60, 0.3);
            animation: shake 0.5s ease-in-out;
        }
        .denied-header {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            padding: 16px 20px;
            text-align: center;
        }
        .denied-body { padding: 32px 24px; text-align: center; }
        .denied-body h3 { font-size: 24px; color: #e74c3c; margin-bottom: 8px; }
        .denied-body p { color: #a0a0a0; font-size: 14px; }
        .register-card {
            margin-top: 24px;
            background: rgba(26, 31, 46, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .register-card h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #b0b0b0;
        }
        .form-group { margin-bottom: 12px; }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15, 20, 34, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #3498db;
            background: rgba(15, 20, 34, 1);
        }
        .form-group input::placeholder { color: #4a4f6e; }
        .search-box { position: relative; }
        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #6c7293;
        }
        .search-box input { padding-left: 42px; }
        .user-list-container {
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 12px;
            border-radius: 14px;
            background: rgba(15, 20, 34, 0.5);
        }
        .user-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            margin: 6px;
            background: rgba(26, 31, 46, 0.9);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .user-item:hover {
            background: rgba(52, 152, 219, 0.2);
            transform: translateX(4px);
        }
        .user-item.selected {
            background: rgba(52, 152, 219, 0.3);
            border-color: #3498db;
        }
        .user-item-info { flex: 1; }
        .user-item-name { font-weight: 600; font-size: 14px; color: white; }
        .user-item-rut { font-size: 11px; color: #8b8faa; margin-top: 2px; }
        .user-item-empresa { font-size: 11px; color: #2ecc71; margin-top: 2px; }
        .user-item-delete {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }
        .user-item-delete:hover {
            background: #e74c3c;
            color: white;
        }
        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.3);
        }
        .btn-delete {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }
        .btn-delete:hover {
            box-shadow: 0 8px 20px rgba(231, 76, 60, 0.3);
        }
        .btn-delete:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1a1f2e;
            border-radius: 24px;
            padding: 32px;
            max-width: 400px;
            margin: 20px;
            text-align: center;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }
        .modal-content h3 { margin-bottom: 16px; color: #fff; }
        .modal-content p { color: #8b8faa; margin-bottom: 24px; line-height: 1.5; }
        .modal-buttons { display: flex; gap: 12px; }
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
        }
        .btn-cancel { background: #2c3e50; color: white; }
        .btn-confirm { background: #e74c3c; color: white; }
        .empty-message {
            padding: 20px;
            text-align: center;
            color: #6c7293;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #3498db; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header">
            <h1>Pulso Go!</h1>
            <p>Sistema de Control de Acceso</p>
        </div>

        <div class="video-container">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
        </div>

        <div style="text-align: center;">
            <div class="status-badge" id="status">
                <i class="fas fa-circle-notch fa-spin"></i>
                <span>Inicializando sistema...</span>
            </div>
        </div>

        <div class="welcome-card" id="welcome-card">
            <div class="card-header">
                <span class="access-badge"><i class="fas fa-check-circle"></i> ACCESO AUTORIZADO</span>
                <i class="fas fa-id-card"></i>
            </div>
            <div class="card-body">
                <div class="user-info">
                    <div class="user-avatar"><i class="fas fa-user-check"></i></div>
                    <div class="user-details">
                        <div class="user-name" id="welcome-name">Cargando...</div>
                        <div class="user-company" id="welcome-company"><i class="fas fa-building"></i><span>Cargando...</span></div>
                    </div>
                </div>
                <div class="info-row">
                    <div class="info-label"><i class="fas fa-id-card"></i><span>RUT / DNI</span></div>
                    <div class="info-value" id="user-rut">---</div>
                </div>
                <div class="info-row">
                    <div class="info-label"><i class="fas fa-briefcase"></i><span>Cargo</span></div>
                    <div class="info-value" id="user-role">---</div>
                </div>
                <div class="access-status"><i class="fas fa-check-circle"></i><span>ACCESO CONCEDIDO</span></div>
            </div>
        </div>

        <div class="denied-card" id="denied-card">
            <div class="denied-header"><i class="fas fa-ban"></i></div>
            <div class="denied-body">
                <i class="fas fa-user-slash" style="font-size: 48px; color: #e74c3c; margin-bottom: 16px; display: block;"></i>
                <h3>ACCESO DENEGADO</h3>
                <p>Usuario no registrado en el sistema</p>
            </div>
        </div>

        <!-- REGISTRAR USUARIO -->
        <div class="register-card">
            <h3><i class="fas fa-user-plus"></i> Registrar Nuevo Usuario</h3>
            <div class="form-group"><input type="text" id="personRut" placeholder="RUT / DNI (Ej: 12.345.678-9)"></div>
            <div class="form-group"><input type="text" id="personName" placeholder="Nombre Completo"></div>
            <div class="form-group"><input type="text" id="personRole" placeholder="Cargo / Puesto"></div>
            <div class="form-group"><input type="text" id="personEmpresa" placeholder="Empresa"></div>
            <button class="btn-register" onclick="enviarANube()"><i class="fas fa-save"></i> Guardar Registro</button>
        </div>

        <!-- ELIMINAR USUARIO CON BUSCADOR -->
        <div class="register-card">
            <h3><i class="fas fa-trash-alt"></i> Eliminar Usuario</h3>
            
            <div class="form-group search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchUser" placeholder="Buscar por nombre, RUT o empresa..." onkeyup="filtrarUsuarios()">
            </div>
            
            <div class="user-list-container" id="userListContainer">
                <div id="userList">
                    <div class="empty-message">
                        <i class="fas fa-spinner fa-pulse"></i> Cargando usuarios...
                    </div>
                </div>
            </div>
            
            <button class="btn-register btn-delete" id="btnEliminarSeleccionado" onclick="eliminarUsuarioSeleccionado()" disabled>
                <i class="fas fa-user-minus"></i> Eliminar Usuario Seleccionado
            </button>
        </div>
    </div>

    <!-- MODAL CONFIRMACION -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: #e74c3c; margin-bottom: 16px;"></i>
            <h3>¿Confirmar eliminación?</h3>
            <p id="confirmMessage"></p>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="cerrarModalEliminar()">Cancelar</button>
                <button class="btn-confirm" onclick="confirmarEliminacionFinal()">Eliminar</button>
            </div>
        </div>
    </div>
</body>
</html>
