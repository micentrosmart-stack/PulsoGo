<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pulso Go! - Control de Acceso Profesional</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script defer src="script.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ============================================
           TEMA PROFESIONAL "BLUE SHADOW"
           Para implementar en cualquier sistema
           ============================================ */

        :root {
            /* Colores primarios */
            --primary-blue: #3b82f6;
            --primary-blue-dark: #2563eb;
            --primary-blue-darker: #1d4ed8;
            --primary-blue-light: #60a5fa;
            
            /* Colores secundarios */
            --success-green: #10b981;
            --success-green-dark: #059669;
            --warning-amber: #f59e0b;
            --warning-amber-dark: #d97706;
            --danger-red: #ef4444;
            --danger-red-dark: #dc2626;
            
            /* Fondo y superficie */
            --bg-dark: #0f172a;
            --bg-darker: #1e293b;
            --bg-card: #ffffff;
            --bg-surface: #f8fafc;
            --bg-hover: #f1f5f9;
            
            /* Texto */
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-light: #94a3b8;
            --text-white: #ffffff;
            
            /* Bordes y sombras */
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            --shadow-glow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-container {
            width: 100%;
            max-width: 500px;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #3b82f6, #2ecc71);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            text-shadow: var(--shadow-glow);
        }

        .header p {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 5px;
            font-weight: 500;
        }

        .video-container {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            box-shadow: var(--shadow-xl), var(--shadow-glow);
            border: 2px solid rgba(59, 130, 246, 0.3);
        }

        video {
            width: 100%;
            display: block;
            aspect-ratio: 4/3;
            object-fit: cover;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Placeholder moderno para el video */
        .video-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            z-index: 5;
            pointer-events: none;
        }

        .video-placeholder i {
            font-size: 64px;
            color: rgba(59, 130, 246, 0.5);
            margin-bottom: 16px;
            animation: pulse-icon 2s infinite;
        }

        .video-placeholder .placeholder-text {
            color: var(--text-light);
            font-size: 14px;
            font-weight: 500;
            background: rgba(59, 130, 246, 0.1);
            padding: 8px 20px;
            border-radius: 60px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            backdrop-filter: blur(4px);
        }

        .video-placeholder .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #3b82f6, #60a5fa, #3b82f6, transparent);
            animation: scan 2.5s ease-in-out infinite;
        }

        @keyframes pulse-icon {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(59, 130, 246, 0.15);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 40px;
            margin-top: 15px;
            font-size: 13px;
            font-weight: 500;
            color: var(--primary-blue-light);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        /* Tarjeta de Bienvenida */
        .welcome-card {
            display: none;
            margin-top: 20px;
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(16, 185, 129, 0.3);
            box-shadow: var(--shadow-xl), 0 0 15px rgba(16, 185, 129, 0.2);
            animation: slideUp 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            color: var(--text-primary);
        }

        .card-header {
            background: linear-gradient(135deg, #10b981, #059669);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-header .access-badge {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            color: white;
        }

        .card-body {
            padding: 24px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .user-company {
            font-size: 13px;
            color: #059669;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }

        .info-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 8px 12px;
            background: rgba(59, 130, 246, 0.05);
            border-radius: 12px;
        }

        .info-label {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-label i {
            width: 18px;
            font-size: 12px;
            color: #059669;
        }

        .info-value {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .access-status {
            margin-top: 16px;
            padding: 12px;
            background: rgba(16, 185, 129, 0.08);
            border-radius: 12px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .access-status i {
            font-size: 20px;
            color: #059669;
        }

        .access-status span {
            font-size: 14px;
            font-weight: 600;
            color: #059669;
        }

        /* Tarjeta Denegada */
        .denied-card {
            display: none;
            margin-top: 20px;
            background: linear-gradient(135deg, #ffffff 0%, #fef2f2 100%);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(239, 68, 68, 0.3);
            box-shadow: var(--shadow-xl);
            animation: shake 0.5s ease-in-out;
            color: var(--text-primary);
        }

        .denied-header {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            padding: 16px 20px;
            text-align: center;
            color: white;
        }

        .denied-body {
            padding: 32px 24px;
            text-align: center;
        }

        .denied-body h3 {
            font-size: 24px;
            color: #dc2626;
            margin-bottom: 8px;
        }

        .denied-body p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Formulario de Registro */
        .register-card {
            margin-top: 24px;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: var(--shadow-lg);
        }

        .register-card h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-white);
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 14px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: rgba(15, 23, 42, 1);
        }

        .form-group input::placeholder {
            color: var(--text-light);
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
        }

        /* Gradientes adicionales */
        .gradient-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }

        .gradient-success {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .gradient-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        /* Animaciones */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Badge GPS con efecto radar */
        .gps-badge {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            padding: 8px 16px;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white;
        }

        .gps-badge.active {
            background: linear-gradient(135deg, #10b981, #059669);
            animation: pulse-radar 1.5s infinite;
        }

        @keyframes pulse-radar {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.5); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header">
            <h1>Pulso Go!</h1>
            <p>Sistema de Control de Acceso Profesional</p>
        </div>

        <div class="video-container">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
            <!-- Placeholder moderno para el video -->
            <div class="video-placeholder" id="video-placeholder">
                <i class="fas fa-camera"></i>
                <span class="placeholder-text">
                    <i class="fas fa-circle-notch fa-spin"></i> Iniciando cámara...
                </span>
                <div class="scan-line"></div>
            </div>
        </div>

        <div style="text-align: center;">
            <div class="status-badge" id="status">
                <i class="fas fa-circle-notch fa-spin"></i>
                <span>Inicializando sistema...</span>
            </div>
        </div>

        <!-- Tarjeta de Bienvenida (Autorizado) -->
        <div class="welcome-card" id="welcome-card">
            <div class="card-header">
                <span class="access-badge"><i class="fas fa-check-circle"></i> ACCESO AUTORIZADO</span>
                <i class="fas fa-id-card" style="color: white;"></i>
            </div>
            <div class="card-body">
                <div class="user-info">
                    <div class="user-avatar">
                        <i class="fas fa-user-check"></i>
                    </div>
                    <div class="user-details">
                        <div class="user-name" id="welcome-name">Cargando...</div>
                        <div class="user-company" id="welcome-company">
                            <i class="fas fa-building"></i>
                            <span>Cargando...</span>
                        </div>
                    </div>
                </div>
                <div class="info-row">
                    <div class="info-label"><i class="fas fa-id-card"></i><span>RUT / DNI</span></div>
                    <div class="info-value" id="user-rut">---</div>
                </div>
                <div class="info-row">
                    <div class="info-label"><i class="fas fa-briefcase"></i><span>Cargo</span></div>
                    <div class="info-value" id="user-role">---</div>
                </div>
                <div class="access-status">
                    <i class="fas fa-check-circle"></i>
                    <span>ACCESO CONCEDIDO</span>
                </div>
            </div>
        </div>

        <!-- Tarjeta de Acceso Denegado -->
        <div class="denied-card" id="denied-card">
            <div class="denied-header">
                <i class="fas fa-ban"></i>
            </div>
            <div class="denied-body">
                <i class="fas fa-user-slash" style="font-size: 48px; color: #ef4444; margin-bottom: 16px; display: block;"></i>
                <h3>ACCESO DENEGADO</h3>
                <p>Usuario no registrado en el sistema</p>
            </div>
        </div>

        <!-- Formulario de Registro -->
        <div class="register-card">
            <h3><i class="fas fa-user-plus"></i> Registrar Nuevo Usuario</h3>
            <div class="form-group">
                <input type="text" id="personRut" placeholder="RUT / DNI (Ej: 12.345.678-9)">
            </div>
            <div class="form-group">
                <input type="text" id="personName" placeholder="Nombre Completo">
            </div>
            <div class="form-group">
                <input type="text" id="personRole" placeholder="Cargo / Puesto">
            </div>
            <div class="form-group">
                <input type="text" id="personEmpresa" placeholder="Empresa">
            </div>
            <button class="btn-register" onclick="enviarANube()">
                <i class="fas fa-save"></i> Guardar Registro
            </button>
        </div>
    </div>

    <script>
        // Control del placeholder del video
        const video = document.getElementById('video');
        const placeholder = document.getElementById('video-placeholder');
        
        video.addEventListener('play', () => {
            placeholder.style.opacity = '0';
            setTimeout(() => {
                placeholder.style.display = 'none';
            }, 300);
        });
        
        video.addEventListener('waiting', () => {
            placeholder.style.display = 'flex';
            placeholder.style.opacity = '1';
            document.querySelector('.placeholder-text').innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Cargando...';
        });
        
        video.addEventListener('canplay', () => {
            if (!video.paused) {
                placeholder.style.opacity = '0';
                setTimeout(() => {
                    placeholder.style.display = 'none';
                }, 300);
            }
        });
    </script>
</body>
</html>
