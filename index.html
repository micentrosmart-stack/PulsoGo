<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulso Go! - Control de Acceso</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script defer src="script.js"></script>
    <style>
        body { margin: 0; background: #121621; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        .main-container { width: 90%; max-width: 450px; display: flex; flex-direction: column; align-items: center; }
        .video-box { position: relative; width: 100%; border-radius: 15px; overflow: hidden; border: 3px solid #3498db; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        video { width: 100%; display: block; background: #000; }
        canvas { position: absolute; top: 0; left: 0; }
        #status { margin-top: 15px; font-size: 16px; color: #3498db; font-weight: bold; }
        
        #welcome-panel { display: none; margin-top: 20px; padding: 20px; background: rgba(46, 204, 113, 0.2); border: 2px solid #2ecc71; border-radius: 10px; width: 80%; animation: fadeIn 0.5s; }
        #welcome-message { font-size: 22px; color: #2ecc71; font-weight: bold; margin: 0; }
        #authorized-text { font-size: 18px; color: #2ecc71; margin: 5px 0 0 0; }
        
        #denied-panel { display: none; margin-top: 20px; padding: 25px; background: linear-gradient(135deg, rgba(231, 76, 60, 0.3), rgba(192, 57, 43, 0.3)); border: 3px solid #e74c3c; border-radius: 10px; width: 80%; animation: fadeIn 0.5s; box-shadow: 0 0 20px rgba(231, 76, 60, 0.5); }
        #denied-message { font-size: 28px; color: #e74c3c; font-weight: bold; margin: 0; text-transform: uppercase; }
        #denied-text { font-size: 18px; color: #e74c3c; margin: 10px 0 0 0; }
        
        .register-box { margin-top: 30px; padding: 20px; background: #1a1f2c; border-radius: 10px; width: 90%; }
        .register-box h3 { margin-top: 0; color: #3498db; }
        .form-group { margin-bottom: 12px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 14px; color: #b0b0b0; }
        input { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #3498db; background: #121621; color: white; box-sizing: border-box; }
        input:focus { outline: none; border-color: #2ecc71; }
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        button:hover { background: #2980b9; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .shake-animation { animation: shake 0.5s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    </style>
</head>
<body>
    <div class="main-container">
        <h1 style="color: #3498db; margin-bottom: 20px;">Pulso Go!</h1>
        
        <div class="video-box">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
        </div>
        
        <div id="status">Cargando sistema...</div>
        
        <div id="welcome-panel">
            <p id="welcome-message">Bienvenido,</p>
            <p id="authorized-text">✅ ACCESO AUTORIZADO</p>
        </div>
        
        <div id="denied-panel">
            <p id="denied-message">🚫 ACCESO DENEGADO</p>
            <p id="denied-text">USUARIO NO REGISTRADO</p>
        </div>
        
        <div class="register-box">
            <h3>📝 REGISTRAR NUEVO USUARIO</h3>
            
            <div class="form-group">
                <label>📧 RUT (Ej: 12.345.678-9)</label>
                <input type="text" id="personRut" placeholder="Ej: 12.345.678-9">
            </div>
            
            <div class="form-group">
                <label>👤 Nombre Completo</label>
                <input type="text" id="personName" placeholder="Nombre y Apellido">
            </div>
            
            <div class="form-group">
                <label>💼 Cargo / Puesto</label>
                <input type="text" id="personRole" placeholder="Ej: Gerente, Operador, etc.">
            </div>
            
            <div class="form-group">
                <label>🏢 Nombre de Empresa</label>
                <input type="text" id="personEmpresa" placeholder="Nombre de la empresa">
            </div>
            
            <button onclick="enviarANube()">💾 GUARDAR EN EXCEL</button>
        </div>
    </div>
</body>
</html>
